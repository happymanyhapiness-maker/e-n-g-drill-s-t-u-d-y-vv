// 単語チップ用：部分文字列一致だと"order"に"in"が誤マッチするなどの問題が起きるため、
// VOCABのenフィールドをトークン分割して完全一致でのみマッチさせる
function vocabTokens(en){
  return en.toLowerCase().split(/[^a-z']+/).filter(function(t){return t.length>0;});
}
// 単独では意味を持たない機能語（前置詞toなど）はチップ表示すると誤マッチしやすいので対象外にする
var VOCAB_STOPWORDS=['to'];
function vocabExactMatch(w){
  var target=w.toLowerCase().replace(/[.,]/g,'').trim();
  if(VOCAB_STOPWORDS.indexOf(target)>=0) return null;
  // 熟語（スペースを含む語句）はフレーズ単位で前方一致を試みる
  if(target.indexOf(' ')>=0){
    for(var j=0;j<VOCAB.length;j++){
      if(VOCAB[j].en.toLowerCase().indexOf(target)===0) return VOCAB[j];
    }
  }
  for(var i=0;i<VOCAB.length;i++){
    var toks=vocabTokens(VOCAB[i].en);
    if(toks.indexOf(target)>=0) return VOCAB[i];
  }
  return null;
}

function shuffle(a){
  var arr=a.slice();
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
  return arr;
}
function weaknessWeight(q){
  var w=1;
  if(state.mistakes.indexOf(q.id)>=0) w+=6;
  if(state.attempted.indexOf(q.id)<0){
    w+=3;
  } else {
    var s=state.catStats[q.cat];
    if(s&&s.total>0){
      var pct=s.correct/s.total*100;
      if(pct<60) w+=4;
      else if(pct<80) w+=1;
    }
  }
  return w;
}
function weightedSample(pool,n){
  var arr=pool.slice();
  var result=[];
  for(var k=0;k<n&&arr.length>0;k++){
    var weights=arr.map(weaknessWeight);
    var total=weights.reduce(function(a,b){return a+b;},0);
    var r=Math.random()*total;
    var acc=0,idx=0;
    for(;idx<weights.length;idx++){ acc+=weights[idx]; if(r<=acc)break; }
    if(idx>=arr.length)idx=arr.length-1;
    result.push(arr[idx]);
    arr.splice(idx,1);
  }
  return result;
}
function buildQueue(cat,mode){
  var pool;
  if(mode==='retry'){
    pool=Q.filter(function(q){return state.mistakes.indexOf(q.id)>=0;});
    var lv=state.levelFilter||'all';
    if(lv!=='all'){
      var filtered=pool.filter(function(q){return catLevel(q.cat)===lv;});
      if(filtered.length>0)pool=filtered;
    }
    if(pool.length===0)pool=Q;
  } else if(cat==='all'){
    var lv=state.levelFilter||'all';
    pool=lv==='all'?Q:Q.filter(function(q){return catLevel(q.cat)===lv;});
    // 「ランダム15問」は弱点（間違えた問題・未挑戦・正答率が低い分野）を優先的に出題する
    var weak=weightedSample(pool,Math.min(15,pool.length));
    state.lastQueueIds=weak.map(function(q){return q.id;});
    return weak;
  } else {
    pool=Q.filter(function(q){return q.cat===cat;});
  }
  var shuffled=shuffle(pool);
  // 直前のセッションと被りにくくするため、前回出た問題を後ろに回す
  if(state.lastQueueIds&&state.lastQueueIds.length>0){
    var prev=state.lastQueueIds;
    var fresh=shuffled.filter(function(q){return prev.indexOf(q.id)<0;});
    var old=shuffled.filter(function(q){return prev.indexOf(q.id)>=0;});
    shuffled=fresh.concat(old);
  }
  var result=shuffled.slice(0,Math.min(15,shuffled.length));
  state.lastQueueIds=result.map(function(q){return q.id;});
  return result;
}
function fmt(s){var m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;}
function updateStreak(){
  var today=new Date().toDateString();
  if(state.lastDate!==today){
    var yest=new Date(Date.now()-86400000).toDateString();
    state.streak=(state.lastDate===yest)?state.streak+1:1;
    state.lastDate=today;
    localStorage.setItem('eng10_streak',state.streak);
    localStorage.setItem('eng10_lastdate',today);
  }
}
function updateCatStats(cat,correct){
  if(!state.catStats[cat])state.catStats[cat]={total:0,correct:0};
  state.catStats[cat].total++;
  if(correct)state.catStats[cat].correct++;
  saveStats(state.catStats);
}
function updateMistakes(id,correct){
  var m=state.mistakes;
  if(!correct){if(m.indexOf(id)<0)m.push(id);}
  else{var i=m.indexOf(id);if(i>=0)m.splice(i,1);}
  state.mistakes=m;saveMistakes(m);
}
function updateAttempted(id){
  if(state.attempted.indexOf(id)<0){state.attempted.push(id);saveAttempted(state.attempted);}
}
function catProgress(cat){
  var qs=Q.filter(function(q){return q.cat===cat;});
  var total=qs.length;
  var mastered=qs.filter(function(q){return state.attempted.indexOf(q.id)>=0&&state.mistakes.indexOf(q.id)<0;}).length;
  return {total:total,mastered:mastered,pct:total>0?Math.round(mastered/total*100):0};
}
function mistakesInLevel(lv){
  if(!lv||lv==='all')return state.mistakes.length;
  return state.mistakes.filter(function(id){
    var q=Q.find(function(qq){return qq.id===id;});
    return q&&catLevel(q.cat)===lv;
  }).length;
}

function catSelectHTML(cats,current,onchange,showWeak,showLevel){
  var opts=cats.map(function(c){
    var label=c==='all'?'すべて':c;
    if(showLevel&&c!=='all'){label='['+catLevel(c)+'] '+label;}
    if(showWeak){
      var s=state.catStats[c];
      var pct=s&&s.total>0?Math.round(s.correct/s.total*100):-1;
      if(pct>=0&&pct<60)label='⚠️ '+label;
    }
    return '<option value="'+c+'"'+(current===c?' selected':'')+'>'+label+'</option>';
  }).join('');
  return '<select class="cat-select" onchange="'+onchange+'(this.value)">'+opts+'</select>';
}

function renderCatCards(){
  var lv=state.levelFilter||'all';
  var cats=CATS.filter(function(c){return c!=='all'&&(lv==='all'||catLevel(c)===lv);});
  var list=cats.map(function(c,i){
    var p=catProgress(c);
    return {cat:c,color:CAT_COLORS[i%CAT_COLORS.length],pct:p.pct,mastered:p.mastered,total:p.total};
  });
  list.sort(function(a,b){return a.pct-b.pct;});
  var showCount=state.startExpanded?list.length:5;
  var shown=list.slice(0,showCount);
  var rows=shown.map(function(item,idx){
    var numStr=(idx+1<10?'0':'')+(idx+1);
    return '<div class="cat-card-row" onclick="startCategoryQuiz(\''+item.cat+'\')">'+
      '<div class="cat-num">'+numStr+'</div>'+
      '<div class="cat-dot" style="background:'+item.color+'"></div>'+
      '<div class="cat-card-main">'+
        '<div class="cat-card-title">'+item.cat+' <span style="font-size:.65rem;font-weight:800;padding:1px 6px;border-radius:8px;'+(catLevel(item.cat)==='高校'?'background:rgba(184,92,107,.15);color:#B85C6B;':'background:rgba(62,122,92,.15);color:#3E7A5C;')+'">'+catLevel(item.cat)+'</span></div>'+
        '<div class="cat-card-bar-row">'+
          '<div class="cat-card-bar"><div class="cat-card-fill" style="width:'+item.pct+'%;background:'+item.color+'"></div></div>'+
          '<div class="cat-card-pct">'+item.pct+'%</div>'+
        '</div>'+
      '</div>'+
      '<div class="cat-card-arrow">›</div>'+
    '</div>';
  }).join('');
  var moreBtn=list.length>5?('<button class="cat-more-btn" onclick="toggleStartExpand()">'+(state.startExpanded?'閉じる ↑':'全'+list.length+'分野を見る →')+'</button>'):'';
  return '<div class="cat-card-list">'+rows+moreBtn+'</div>';
}

function renderQuiz(){
  var q=state.queue[state.idx];
  var total=state.queue.length;
  var pct=Math.round((state.idx/total)*100);
  var labels=['A','B','C','D'];

  // ✅ ひっかけ表記削除（タグ文字だけ整形）
  var cleanTag = q.tag
    .replace('⚠️ひっかけ：','')
    .replace('⚠️ひっかけ','');

  // ✅ 問題文のヒント完全除去
  var cleanText = q.text
    .replace(/<strong[^>]*>.*?<\/strong>/g, '')   // strongタグ削除
    .replace(/（.*?：.*?）/g, '');                // （現在完了：never）等

  var qHTML='';
  if(q.type==='choice'){
    qHTML='<div class="choices">';
    for(var i=0;i<q.choices.length;i++){
      var cls='choice';
      if(state.answered){
        if(i===q.answer) cls+=' correct';
        else if(i===state.selected) cls+=' wrong';
      }
      qHTML+='<button type="button" class="'+cls+'" '+(state.answered?'disabled':'')+' onclick="answerChoice('+i+');this.blur()"><span class="badge">'+labels[i]+'</span>'+q.choices[i]+'</button>';
    }
    qHTML+='</div>';
  } else {
    var ic=state.answered?(state.inputVal.trim().toLowerCase()===q.answer.toLowerCase()?'ok':'ng'):'';
    qHTML='<div class="input-area">'+
      '<input id="qi" class="q-input '+ic+'" type="text" placeholder="英語で入力してください"'+(state.answered?' disabled':'')+' onkeydown="if(event.key===\'Enter\')answerInput()" oninput="state.inputVal=this.value"/>'+
      (!state.answered?'<button class="submit-btn" onclick="answerInput()">答える</button>':'')+
    '</div>';
  }

  var tc='timer'+(state.timerSec<60?' urgent':'');

  // ✅ ヒント行・ひっかけ表示は完全削除済み
  app.innerHTML=
    '<div class="abort-row"><button class="abort-btn" onclick="abortDrillQuiz()">✕ 中断する</button></div>'+
    catSelectHTML(CATS,state.category,'changeCat',true,true)+
    '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-label">'+(state.idx+1)+'/'+total+'</div></div>'+
    '<div class="timer-row"><div class="'+tc+'" id="timerEl">⏱ '+fmt(state.timerSec)+'</div></div>'+
    '<div class="card">'+
      '<div style="margin-bottom:8px;">'+levelBadgeHTML(q.cat)+'</div>'+
      '<div class="q-text">'+cleanText+'</div>'+
      qHTML+
    '</div>'+
    '<div id="fbArea"></div><div id="wbArea"></div><div id="advArea"></div><div id="actArea"></div>';

  if(!state.answered && q.type==='input'){
    setTimeout(function(){
      var el=document.getElementById('qi');
      if(el){
        el.value=state.inputVal;
        el.focus();
      }
    },30);
  }

  if(state.answered) renderFeedback(q);
}

function renderFeedback(q){
  var isC=(q.type==='choice')?(state.selected===q.answer):(state.inputVal.trim().toLowerCase()===q.answer.toLowerCase());
  var fb=document.getElementById('fbArea');
  if(fb)fb.innerHTML='<div class="feedback '+(isC?'ok':'ng')+'">'+
    '<div class="fb-title">'+(isC?'✅ 正解！':'❌ 不正解')+'</div>'+
    '<div class="fb-body">'+
      (!isC&&q.type!=='choice'?'<div style="margin-bottom:6px;">正しい答え: <b style="color:var(--muted)">'+q.answer+'</b></div>':'')+
      (q.jp?'<div style="margin-bottom:8px;color:var(--muted);font-size:.86rem;">🇯🇵 '+q.jp+'</div>':'')+
      q.exp+
      '<div class="grammar-box">📌 文法ポイント: '+q.gram+'</div>'+
    '</div></div>';
  var wb=document.getElementById('wbArea');
  if(wb&&q.words&&q.words.length>0){
    var chips=q.words.map(function(w){
      var vs=vocabExactMatch(w);
      return '<span class="word-chip"><b>'+w+'</b>'+(vs?' = '+vs.jp:'')+'</span>';
    }).join('');
    wb.innerHTML='<div class="word-box"><div class="word-label">📖 この問題のキーワード</div><div class="word-list">'+chips+'</div></div>';
  }
  if(!isC){var adv=document.getElementById('advArea');if(adv)adv.innerHTML='<div class="advice-box"><div class="advice-label">💬 アドバイス</div><div class="advice-text">'+q.adv+'</div></div>';}
  var act=document.getElementById('actArea');
  var isLast=state.idx>=state.queue.length-1;
  if(act)act.innerHTML='<div class="action-row"><button class="next-btn" onclick="'+(isLast?'finishQuiz()':'nextQuestion()')+'">'+(isLast?'結果を見る 🎉':'次の問題 →')+'</button></div>';
}

function answerChoice(i){
  if(state.answered)return;
  var q=state.queue[state.idx];state.selected=i;state.answered=true;
  var ok=i===q.answer;if(ok)state.correct++;else state.wrong++;
  state.results.push({q:q,correct:ok});updateCatStats(q.cat,ok);updateMistakes(q.id,ok);updateAttempted(q.id);recordDailyActivity();renderQuiz();
}
function answerInput(){
  if(state.answered)return;
  var el=document.getElementById('qi');if(el)state.inputVal=el.value;
  if(!state.inputVal.trim())return;
  var q=state.queue[state.idx];state.answered=true;
  var ok=state.inputVal.trim().toLowerCase()===q.answer.toLowerCase();
  if(ok)state.correct++;else state.wrong++;
  state.results.push({q:q,correct:ok});updateCatStats(q.cat,ok);updateMistakes(q.id,ok);updateAttempted(q.id);recordDailyActivity();renderQuiz();
}
function nextQuestion(){state.idx++;state.answered=false;state.selected=null;state.inputVal='';renderQuiz();}
function changeCat(c){
  if(state.answered)return;
  clearInterval(state.timerHandle);state.category=c;
  state.queue=buildQueue(c,state.mode);state.idx=0;state.answered=false;state.selected=null;state.inputVal='';
  state.correct=0;state.wrong=0;state.results=[];state.timerSec=600;startTimer();renderQuiz();
}
function finishQuiz(){clearInterval(state.timerHandle);updateStreak();state.screen='result';render();}

function renderResult(){
  var total=state.queue.length,pct=Math.round((state.correct/total)*100),timeUsed=600-state.timerSec;
  var emoji=pct>=80?'🎉':pct>=60?'💪':'😤';
  var msg=pct>=80?'素晴らしい！完璧に近い！':pct>=60?'いい調子！もう少し！':'間違いが次の成長につながる！';
  var r=47,circ=2*Math.PI*r,dash=Math.round(circ*pct/100);
  var catMap={};
  state.results.forEach(function(res){
    var c=res.q.cat;if(!catMap[c])catMap[c]={total:0,correct:0};
    catMap[c].total++;if(res.correct)catMap[c].correct++;
  });
  var weakHTML='<div class="section-title">📊 今回のカテゴリ別結果</div><div class="weak-grid">';
  Object.keys(catMap).forEach(function(c){
    var d=catMap[c],p=Math.round(d.correct/d.total*100),bad=p<60;
    weakHTML+='<div class="weak-card'+(bad?' bad':'')+'">'+
      '<div class="weak-cat">'+(bad?'⚠️ ':'')+c+'</div>'+
      '<div class="weak-bar-wrap"><div class="weak-bar-fill'+(bad?' low':'')+'" style="width:'+p+'%"></div></div>'+
      '<div class="weak-pct">'+d.correct+'/'+d.total+' ('+p+'%)</div></div>';
  });
  weakHTML+='</div>';
  var rev='<div class="section-title">📋 問題の振り返り</div><div class="review">';
  state.results.forEach(function(res){
    var ca=res.q.type==='choice'?res.q.choices[res.q.answer]:res.q.answer;
    rev+='<div class="ri" style="border:1px solid '+(res.correct?'rgba(61,214,140,.3)':'rgba(255,92,106,.3)')+';">'+
      '<span style="color:'+(res.correct?'var(--green)':'var(--red)')+';">'+(res.correct?'✅':'❌')+'</span> '+
      '<span style="color:var(--muted);margin-left:3px;">['+res.q.cat+']</span> '+
      res.q.text.replace(/<[^>]+>/g,'').substring(0,28)+'…'+
      (!res.correct?'<div style="margin-top:3px;padding-left:16px;color:var(--muted);">正解: <span style="color:var(--muted);">'+ca+'</span></div>':'')+
    '</div>';
  });
  rev+='</div>';
  app.innerHTML='<div class="result-wrap">'+
    '<div class="result-top">'+
      '<div class="result-emoji">'+emoji+'</div>'+
      '<div class="result-title">'+msg+'</div>'+
      '<div class="result-sub">今日のトレーニング完了！毎日続けよう💪</div>'+
      '<div class="score-ring"><svg width="110" height="110" viewBox="0 0 110 110">'+
        '<circle cx="55" cy="55" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="12"/>'+
        '<circle cx="55" cy="55" r="'+r+'" fill="none" stroke="url(#g1)" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+dash+' '+Math.ceil(circ)+'"/>'+
        '<defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#B08A6C"/><stop offset="100%" stop-color="#B08A6C"/></linearGradient></defs>'+
      '</svg><div class="score-num">'+pct+'%</div></div>'+
      '<div class="stats">'+
        '<div class="stat"><div class="sv" style="color:var(--green)">'+state.correct+'</div><div class="sl">正解</div></div>'+
        '<div class="stat"><div class="sv" style="color:var(--red)">'+state.wrong+'</div><div class="sl">不正解</div></div>'+
        '<div class="stat"><div class="sv">'+fmt(timeUsed)+'</div><div class="sl">タイム</div></div>'+
        '<div class="stat"><div class="sv" style="color:var(--muted)">'+state.streak+'</div><div class="sl">連続日数</div></div>'+
        '<div class="stat"><div class="sv" style="color:var(--red)">'+state.mistakes.length+'</div><div class="sl">要復習</div></div>'+
      '</div>'+
    '</div>'+
    weakHTML+rev+
    '<div class="action-btns">'+
      '<button class="restart-btn" onclick="restartQuiz()">もう一度 🔄</button>'+
      (state.mistakes.length>0?'<button class="retry-btn" onclick="retryMistakes()">間違い直し 🔁</button>':'')+
    '</div>'+
  '</div>';
}

// ── Vocab state ──
function loadVocabStats(){try{return JSON.parse(localStorage.getItem('eng10_vocab')||'{}');}catch(e){return{};}}
function saveVocabStats(s){try{localStorage.setItem('eng10_vocab',JSON.stringify(s));}catch(e){}}
// vocabStats[en] = {correct:N, wrong:N, mastered:bool}

var vState={
  mode:'quiz',   // quiz | review | list
  catFilter:'all',
  quizList:[],quizIdx:0,quizAnswered:false,quizSelected:-1,quizCorrect:0,quizDone:false,
  vocabStats:loadVocabStats()
};

function getVocabPool(mode){
  var cf=vState.catFilter;
  var base=cf==='all'?VOCAB:VOCAB.filter(function(v){return v.cat===cf;});
  if(mode==='review') return base.filter(function(v){
    var s=vState.vocabStats[v.en];return s&&s.wrong>0&&!s.mastered;
  });
  if(mode==='unseen') return base.filter(function(v){return !vState.vocabStats[v.en];});
  return base;
}

function renderVocab(){
  var cats=['all'].concat(VOCAB.map(function(v){return v.cat;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
  var cbHTML=catSelectHTML(cats,vState.catFilter,'setVocabCat',false);

  // 統計集計
  var all=vState.catFilter==='all'?VOCAB:VOCAB.filter(function(v){return v.cat===vState.catFilter;});
  var masterCnt=all.filter(function(v){var s=vState.vocabStats[v.en];return s&&s.mastered;}).length;
  var reviewCnt=all.filter(function(v){var s=vState.vocabStats[v.en];return s&&s.wrong>0&&!s.mastered;}).length;
  var unseenCnt=all.filter(function(v){return !vState.vocabStats[v.en];}).length;

  var modeHTML='<div class="vocab-mode-row">'+
    '<button class="vocab-mode-btn'+(vState.mode==='quiz'?' active':'')+'" onclick="setVocabMode(\'quiz\')">📝 全単語クイズ</button>'+
    '<button class="vocab-mode-btn'+(vState.mode==='review'?' active':'')+'" onclick="setVocabMode(\'review\')">🔁 要復習（'+reviewCnt+'）</button>'+
    '<button class="vocab-mode-btn'+(vState.mode==='list'?' active':'')+'" onclick="setVocabMode(\'list\')">📋 一覧</button>'+
  '</div>';

  var statsBar='<div style="display:flex;gap:8px;margin-bottom:14px;">'+
    '<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px;text-align:center;">'+
      '<div style="font-family:Nunito,sans-serif;font-size:1.3rem;font-weight:900;color:var(--green);">'+masterCnt+'</div>'+
      '<div style="font-size:.72rem;color:var(--muted);">マスター✅</div>'+
    '</div>'+
    '<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px;text-align:center;">'+
      '<div style="font-family:Nunito,sans-serif;font-size:1.3rem;font-weight:900;color:var(--red);">'+reviewCnt+'</div>'+
      '<div style="font-size:.72rem;color:var(--muted);">要復習🔁</div>'+
    '</div>'+
    '<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px;text-align:center;">'+
      '<div style="font-family:Nunito,sans-serif;font-size:1.3rem;font-weight:900;color:var(--muted);">'+unseenCnt+'</div>'+
      '<div style="font-size:.72rem;color:var(--muted);">未挑戦</div>'+
    '</div>'+
  '</div>';

  var header='<div class="vocab-wrap">'+
    '<div style="font-size:.97rem;font-weight:700;margin-bottom:12px;">📖 単語帳（'+all.length+'件）</div>'+
    statsBar+modeHTML+cbHTML;

  if(vState.mode==='list') app.innerHTML=header+renderVocabList(all)+'</div>';
  else app.innerHTML=header+renderVQuiz(vState.mode)+'</div>';
}

function renderVocabList(list){
  if(list.length===0)return '<div style="color:var(--muted);text-align:center;padding:20px;">単語がありません</div>';
  var items=list.map(function(v){
    var s=vState.vocabStats[v.en];
    var badge='';
    if(s&&s.mastered) badge='<span class="vocab-badge master">✅ マスター</span>';
    else if(s&&s.wrong>0) badge='<span class="vocab-badge review">🔁 要復習</span>';
    else if(s) badge='<span class="vocab-badge unseen">挑戦済</span>';
    else badge='<span class="vocab-badge unseen">未挑戦</span>';
    return '<div class="vocab-list-item">'+
      '<div>'+
        '<div class="vocab-list-en">'+v.en+(v.ipa?' <span style="font-weight:400;color:var(--muted);font-size:.78rem;">'+v.ipa+'</span>':'')+'</div>'+
        '<div class="vocab-list-jp">'+v.jp+'</div>'+
        '<div style="font-size:.7rem;color:var(--accent2);margin-top:2px;">'+v.cat+'</div>'+
      '</div>'+badge+
    '</div>';
  }).join('');
  return '<div>'+items+'</div>';
}

function renderVQuiz(mode){
  var pool=getVocabPool(mode);
  if(pool.length===0){
    var msg=mode==='review'?'要復習の単語はありません！全部マスターしてる🎉':'単語がありません';
    return '<div style="text-align:center;padding:28px;color:var(--muted);">'+msg+'</div>';
  }

  // 初期化
  if(!vState.quizList||vState.quizList.length===0){
    vState.quizList=shuffle(pool);
    vState.quizIdx=0;vState.quizCorrect=0;vState.quizAnswered=false;vState.quizSelected=-1;vState.quizDone=false;
  }

  if(vState.quizDone){
    var pct=Math.round(vState.quizCorrect/vState.quizList.length*100);
    var emoji=pct>=80?'🎉':pct>=60?'💪':'😤';
    var msg2=pct>=80?'完璧！':pct>=60?'いい調子！':'要復習で繰り返そう！';
    return '<div class="vquiz-card" style="text-align:center;">'+
      '<div style="font-size:2.5rem;margin-bottom:8px;">'+emoji+'</div>'+
      '<div style="font-family:Nunito,sans-serif;font-size:1.5rem;font-weight:900;margin-bottom:4px;">'+pct+'%  '+msg2+'</div>'+
      '<div style="color:var(--muted);font-size:.88rem;margin-bottom:20px;">'+vState.quizCorrect+' / '+vState.quizList.length+' 正解</div>'+
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'+
        '<button onclick="restartVQuiz()" style="padding:11px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:.9rem;font-weight:800;cursor:pointer;">もう一度</button>'+
        '<button onclick="setVocabMode(\'review\')" style="padding:11px 20px;background:var(--surface);border:1.5px solid var(--red);border-radius:12px;color:var(--red);font-size:.88rem;font-weight:700;cursor:pointer;">要復習だけやる🔁</button>'+
      '</div>'+
    '</div>';
  }

  var qi=Math.min(vState.quizIdx,vState.quizList.length-1);
  var v=vState.quizList[qi];
  var s=vState.vocabStats[v.en];
  var statusBadge=s&&s.mastered?'<span style="font-size:.7rem;color:var(--green);margin-left:6px;">✅ マスター済</span>':
    s&&s.wrong>0?'<span style="font-size:.7rem;color:var(--red);margin-left:6px;">🔁 要復習</span>':'';

  // 選択肢生成：初回だけ生成してstateに保存（renderのたびに変わらないよう固定）
  var allVocab=vState.catFilter==='all'?VOCAB:VOCAB.filter(function(x){return x.cat===vState.catFilter;});
  if(!vState.currentOpts||vState.currentOptsIdx!==qi){
    var others=shuffle(allVocab.filter(function(x){return x.en!==v.en;})).slice(0,3);
    vState.currentOpts=shuffle([v].concat(others));
    vState.currentCorrectIdx=vState.currentOpts.indexOf(v);
    vState.currentOptsIdx=qi;
  }
  var opts=vState.currentOpts;
  var correctIdx=vState.currentCorrectIdx;

  var optHTML=opts.map(function(o,i){
    var border,bg,color,badgeBg,badgeColor;
    if(vState.quizAnswered){
      if(i===correctIdx){
        border='1.5px solid #3E7A5C';bg='#EFF6F1';color='#3E7A5C';badgeBg='#3E7A5C';badgeColor='#fff';
      } else if(i===vState.quizSelected){
        border='1.5px solid #B85C6B';bg='#FAEEF0';color='#B85C6B';badgeBg='#B85C6B';badgeColor='#fff';
      } else {
        border='1.5px solid #E5E5E5';bg='#F0EAE0';color='#8A8A8A';badgeBg='#E5E5E5';badgeColor='#8A8A8A';
      }
    } else {
      border='1.5px solid #E5E5E5';bg='#F0EAE0';color='#1A1A1A';badgeBg='#EDE6D8';badgeColor='#8A8A8A';
    }
    var labels=['A','B','C','D'];
    var onclick=!vState.quizAnswered?'onclick="answerVQuiz('+i+')"':'';
    return '<div '+onclick+' style="padding:12px 15px;border-radius:13px;border:'+border+';background:'+bg+';color:'+color+';font-size:.95rem;text-align:left;font-family:Noto Sans JP,sans-serif;display:flex;align-items:center;gap:10px;font-weight:500;margin-bottom:9px;cursor:'+(vState.quizAnswered?'default':'pointer')+';">'+
      '<span style="width:25px;height:25px;border-radius:50%;background:'+badgeBg+';color:'+badgeColor+';display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;">'+labels[i]+'</span>'+
      o.jp+'</div>';
  }).join('');

  var feedHTML='';
  if(vState.quizAnswered){
    var ok=vState.quizSelected===correctIdx;
    var sNow=vState.vocabStats[v.en]||{correct:0,wrong:0};
    var isMastered=sNow.mastered;
    feedHTML='<div class="feedback '+(ok?'ok':'ng')+'">'+
      '<div class="fb-title">'+(ok?'✅ 正解！':'❌ 不正解')+'</div>'+
      '<div class="fb-body">'+
        '<b>'+v.en+'</b>'+(v.ipa?' <span style="color:var(--muted);font-weight:400;">'+v.ipa+'</span>':'')+' = '+v.jp+'<br>'+
        '<span style="font-size:.82rem;opacity:.85;">例: '+v.ex+'</span>'+
        (isMastered?'<div style="margin-top:8px;font-size:.82rem;color:var(--green);">🌟 マスター達成！</div>':'')+
      '</div>'+
    '</div>'+
    '<div class="action-row"><button class="next-btn" onclick="nextVQuiz()">'+(qi>=vState.quizList.length-1?'結果を見る 🎉':'次の単語 →')+'</button></div>';
  }

  var pBar=Math.round((qi/vState.quizList.length)*100);
  return '<div class="abort-row"><button class="abort-btn" onclick="abortVQuiz()">✕ 中断する</button></div>'+
    '<div style="margin-bottom:10px;">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'+
        '<div style="flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden;">'+
          '<div style="height:100%;width:'+pBar+'%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div>'+
        '</div>'+
        '<div style="font-size:.78rem;color:var(--muted);white-space:nowrap;">'+(qi+1)+'/'+vState.quizList.length+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="vquiz-card">'+
      '<div class="vquiz-q">次の英語・表現の意味は？'+statusBadge+'</div>'+
      '<div class="vquiz-en">'+v.en+(v.ipa?' <span style="font-size:.75rem;color:var(--muted);font-weight:400;">'+v.ipa+'</span>':'')+'</div>'+
      '<div class="vquiz-cat">'+v.cat+'</div>'+
      '<div class="choices">'+optHTML+'</div>'+
    '</div>'+feedHTML;
}

function answerVQuiz(i){
  if(vState.quizAnswered)return;
  var correct=vState.currentCorrectIdx;
  vState.quizSelected=i;vState.quizAnswered=true;
  var v=vState.quizList[vState.quizIdx];
  var ok=i===correct;
  // 記録更新
  var s=vState.vocabStats[v.en]||{correct:0,wrong:0,mastered:false};
  if(ok){s.correct++;if(s.correct>=3&&s.wrong===0)s.mastered=true;}

var rState={
  screen:'start',   // start | quiz | result
  mode:'shadow',    // shadow(音読・シャドーイング) | dictation(ディクテーション)
  level:'basic',    // basic(中学/基本5文型) | hs(高校入門/複文)

// ── ディクテーション(穴埋め書き取り・ワードバンク方式) ──
var DICT_DISTRACT_BASIC=['go','went','make','made','have','has','play','plays','watch','watched','write','wrote','study','studies','eat','ate','see','saw','give','gave','take','took','read','build','built','call','called','sing','sang'];
var DICT_DISTRACT_HS=['having','considering','judging','were','should','being','done','doing','asked','told','said','suggested','exclaimed','comes','was','did','have','had','stolen','made','cut','agree','know','knew','seen','written'];
var dictState={queue:[],idx:0,filled:[],bank:[],checked:false,itemCorrect:false,correctCount:0,bankRevealed:false};
function buildDictationItem(item){
  var words=item.chunks.map(function(c){return c.t;}).join(' ').split(' ');
  var vChunk=item.chunks.filter(function(c){return c.r==='V';})[0];
  if(!vChunk)return null;
  var vWords=vChunk.t.replace(/[.,!]/g,'').split(' ').map(function(w){return w.toLowerCase();});
  var wLower=words.map(function(w){return w.replace(/[.,!]/g,'').toLowerCase();});
  var blankIdx=[];
  for(var i=0;i<=wLower.length-vWords.length;i++){
    var match=true;
    for(var j=0;j<vWords.length;j++){ if(wLower[i+j]!==vWords[j]){match=false;break;} }
    if(match){ for(var j=0;j<vWords.length;j++)blankIdx.push(i+j); break; }
  }
  if(blankIdx.length===0)return null;
  return {words:words,blankIdx:blankIdx,correctWords:blankIdx.map(function(i){return wLower[i];}),jp:item.jp};
}
function buildDictQueue(){
  var raw=buildReadQueue();
  dictState.queue=raw.map(buildDictationItem).filter(function(x){return x;});
  dictState.idx=0;dictState.correctCount=0;
  initDictItem();
}
function initDictItem(){
  var item=dictState.queue[dictState.idx];
  if(!item)return;
  dictState.filled=item.blankIdx.map(function(){return null;});
  var correct=item.correctWords.slice();
  var pool=rState.level==='hs'?DICT_DISTRACT_HS:DICT_DISTRACT_BASIC;
  var distractors=shuffle(pool.filter(function(w){return correct.indexOf(w)<0;})).slice(0,Math.max(3,6-correct.length));
  var bankWords=shuffle(correct.concat(distractors));
  dictState.bank=bankWords.map(function(w){return {word:w,used:false};});
  dictState.checked=false;
  dictState.bankRevealed=false;
}
function playDictAudio(){
  var item=dictState.queue[dictState.idx];
  if(!item)return;
  var myIdx=dictState.idx;
  speakSentence(item.words.join(' '),function(){
    if(dictState.idx===myIdx&&rState.mode==='dictation'&&rState.screen==='quiz'){
      dictState.bankRevealed=true;
      render();
    }
  });
}
function tapBankTile(i){
  if(dictState.checked)return;
  var tile=dictState.bank[i];
  if(tile.used)return;
  var slot=dictState.filled.indexOf(null);
  if(slot<0)return;
  dictState.filled[slot]=i;tile.used=true;
  render();
}
function tapFilledSlot(slotIdx){
  if(dictState.checked)return;
  var bankIdx=dictState.filled[slotIdx];
  if(bankIdx==null)return;
  dictState.bank[bankIdx].used=false;
  dictState.filled[slotIdx]=null;
  render();
}
function checkDictAnswer(){
  if(dictState.filled.indexOf(null)>=0)return;
  var item=dictState.queue[dictState.idx];
  var allCorrect=true;
  for(var i=0;i<dictState.filled.length;i++){
    var word=dictState.bank[dictState.filled[i]].word;
    if(word!==item.correctWords[i])allCorrect=false;
  }
  dictState.checked=true;dictState.itemCorrect=allCorrect;
  if(allCorrect)dictState.correctCount++;
  recordDailyActivity();
  render();
}
function nextDictItem(){
  if(dictState.idx>=dictState.queue.length-1){rState.screen='result';render();return;}
  dictState.idx++;initDictItem();render();
}
function renderDictQuiz(){
  var item=dictState.queue[dictState.idx];
  if(!item){rState.screen='start';render();return;}
  var total=dictState.queue.length;
  var pBar=Math.round((dictState.idx/total)*100);
  var sentenceHTML=item.words.map(function(w,i){
    var blankPos=item.blankIdx.indexOf(i);
    if(blankPos<0)return '<span style="margin:2px 4px;">'+w+'</span>';
    var filledBankIdx=dictState.filled[blankPos];
    if(filledBankIdx==null){
      return '<span style="display:inline-block;min-width:60px;border-bottom:3px solid var(--accent);margin:2px 6px;color:transparent;">___</span>';
    }
    var word=dictState.bank[filledBankIdx].word;
    var colorStyle='';
    if(dictState.checked){colorStyle=word===item.correctWords[blankPos]?'color:var(--green);':'color:var(--red);text-decoration:line-through;';}
    return '<span onclick="'+(dictState.checked?'':'tapFilledSlot('+blankPos+')')+'" style="display:inline-block;border-bottom:3px solid var(--accent);margin:2px 6px;font-weight:800;cursor:pointer;'+colorStyle+'">'+word+'</span>';
  }).join('');
  var bankHTML=dictState.bank.map(function(tile,i){
    return '<button class="choice" style="display:inline-block;width:auto;padding:8px 16px;'+(tile.used?'opacity:.3;pointer-events:none;':'')+'" onclick="tapBankTile('+i+')">'+tile.word+'</button>';
  }).join('');
  var bankSection=dictState.bankRevealed?
    '<div class="vquiz-card"><div class="word-label" style="margin-bottom:8px;">ワードバンク（タップで空欄に入れる）</div><div style="display:flex;flex-wrap:wrap;gap:8px;">'+bankHTML+'</div></div>':
    '<div class="vquiz-card" style="text-align:center;color:var(--muted);font-size:.83rem;">🔊 音声が流れ終わると、ここに選択肢が表示されます</div>';
  var allFilled=dictState.filled.indexOf(null)<0;
  var actionHTML;
  if(!dictState.checked){
    actionHTML='<div class="action-row"><button class="next-btn" '+(allFilled?'':'disabled style="opacity:.4;"')+' onclick="checkDictAnswer()">答え合わせ ✓</button></div>';
  } else {
    var isLast=dictState.idx>=total-1;
    actionHTML='<div class="feedback '+(dictState.itemCorrect?'ok':'ng')+'"><div class="fb-title">'+(dictState.itemCorrect?'✅ 正解！':'❌ 不正解')+'</div><div class="fb-body">正しい語: <b>'+item.correctWords.join(' ')+'</b><br>'+item.jp+'</div></div>'+
      '<div class="action-row"><button class="next-btn" onclick="nextDictItem()">'+(isLast?'結果を見る 🎉':'次の文へ →')+'</button></div>';
  }
  app.innerHTML=
    '<div class="abort-row"><button class="abort-btn" onclick="abortReadSession()">✕ 中断する</button></div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+pBar+'%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div></div><div style="font-size:.78rem;color:var(--muted);white-space:nowrap;">'+(dictState.idx+1)+'/'+total+'</div></div>'+
    '<div class="read-prompt">🎧 音声を聞いて、聞き取った単語を下のワードバンクからタップして空欄を埋めよう</div>'+
    '<div class="vquiz-card">'+
      '<button class="speak-btn" onclick="playDictAudio()">🔊 '+(dictState.bankRevealed?'もう一度聞く':'音声で聞く')+'</button>'+
      '<div class="read-sentence" style="line-height:2.4;">'+sentenceHTML+'</div>'+
    '</div>'+
    bankSection+
    actionHTML;
}

function buildReadQueue(){
  if(rState.level==='hs'){
    var poolH=rState.cat==='all'?READ_HS:READ_HS.filter(function(s){return s.grammar===rState.cat;});
    return shuffle(poolH).slice(0,Math.min(5,poolH.length));
  }
  var pool=rState.cat==='all'?READ:READ.filter(function(s){return s.pattern===rState.cat;});
  return shuffle(pool).slice(0,Math.min(5,pool.length));
}

var _readUtter=null; // Safari対策: utteranceがGCされると再生が止まることがあるのでグローバル保持
function speakSentence(text,onEndCb){
  try{
    if(!('speechSynthesis' in window)){
      if(onEndCb)onEndCb(); // 未対応ブラウザではフォールバックとして即座に選択肢を表示
      return;
    }
    window.speechSynthesis.cancel();
    _readUtter=new SpeechSynthesisUtterance(text);
    _readUtter.lang='en-US';
    _readUtter.rate=0.9;
    if(onEndCb){_readUtter.onend=onEndCb;_readUtter.onerror=onEndCb;}
    window.speechSynthesis.speak(_readUtter);
  }catch(e){if(onEndCb)onEndCb();}
}

      '<div class="lr-title">🎧 '+p.title+'</div>'+
      '<div style="font-size:.8rem;color:var(--muted);margin-bottom:14px;">文章は表示されません。音声をよく聞いて設問に答えましょう（何度でも再生できます）</div>'+
      '<button class="speak-btn" onclick="speakSentence(currentPassage().sentences.join(\' \'))">🔊 音声を再生（全文）</button>'+
    '</div>';
  } else {
    var textHTML=p.sentences.map(function(s,i){return '<span class="sent-num">'+(i+1)+'</span>'+s+' ';}).join('');
    topHTML='<div class="lr-text-card"><div class="lr-title">'+p.title+'</div>'+textHTML+'</div>';
  }
  var q=p.questions[lrState.qIdx];
  var labels=['A','B','C','D'];
  var qTypeLabel={main:'📌 内容一致',ref:'🔍 指示語・下線部解釈',vocab:'📖 語彙の文脈推測'}[q.type];
  var choicesHTML='<div class="choices">';
  for(var i=0;i<q.choices.length;i++){
    var cls='choice';
    if(lrState.answered){
      if(i===q.answer)cls+=' correct';
      else if(i===lrState.selected)cls+=' wrong';
    }
    choicesHTML+='<button type="button" class="'+cls+'" '+(lrState.answered?'disabled':'')+' onclick="answerLR('+i+')"><span class="badge">'+labels[i]+'</span>'+q.choices[i]+'</button>';
  }
  choicesHTML+='</div>';
  var feedHTML='';
  if(lrState.answered){
    var ok=lrState.selected===q.answer;
    var isLast=lrState.qIdx>=p.questions.length-1;
    feedHTML='<div class="feedback '+(ok?'ok':'ng')+'">'+
      '<div class="fb-title">'+(ok?'✅ 正解！':'❌ 不正解')+'</div>'+
      '<div class="fb-body">'+q.exp+'</div>'+
    '</div>'+
    '<div class="action-row"><button class="next-btn" onclick="'+(isLast?'finishLR()':'nextLRQuestion()')+'">'+(isLast?'結果を見る 🎉':'次の設問 →')+'</button></div>';
  }
  app.innerHTML=
    '<div class="abort-row"><button class="abort-btn" onclick="abortLRPassage()">✕ 中断する</button></div>'+
    topHTML+
    '<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+Math.round((lrState.qIdx/p.questions.length)*100)+'%"></div></div><div class="progress-label">'+(lrState.qIdx+1)+'/'+p.questions.length+'</div></div>'+
    '<div class="card">'+
      (isListening?'<button class="speak-btn" style="margin-bottom:12px;" onclick="speakSentence(currentPassage().sentences.join(\' \'))">🔊 もう一度聞く</button>':'')+
      '<div class="q-tag">'+qTypeLabel+'</div>'+
      '<div class="q-text">'+q.q+'</div>'+
      choicesHTML+
    '</div>'+
    feedHTML;
}
function answerLR(i){
  if(lrState.answered)return;
  var p=currentPassage();var q=p.questions[lrState.qIdx];
  lrState.selected=i;lrState.answered=true;
  if(i===q.answer)lrState.correct++;
  recordDailyActivity();
  renderLRPassage();
}
function nextLRQuestion(){lrState.qIdx++;lrState.answered=false;lrState.selected=-1;renderLRPassage();}
function finishLR(){lrState.screen='result';render();}
function toggleLRJp(){lrState.showJp=true;render();}
function toggleLRScript(){lrState.showScript=true;render();}
function renderLRResult(){
  var p=currentPassage();
  var total=p.questions.length;
  var pct=Math.round(lrState.correct/total*100);
  var emoji=pct>=80?'🎉':pct>=60?'💪':'😤';
  var scriptHTML='';
  if(lrState.mode==='listening'){
    var textHTML=p.sentences.map(function(s,i){return '<span class="sent-num">'+(i+1)+'</span>'+s+' ';}).join('');
    scriptHTML='<div class="lr-text-card" style="text-align:left;">'+
      '<div class="lr-title">🎧 英文スクリプト</div>'+
      (lrState.showScript?'<div>'+textHTML+'</div>':'<button class="jp-toggle-btn" onclick="toggleLRScript()">英文スクリプトを見る</button>')+
    '</div>';
  }
  app.innerHTML='<div class="result-wrap" style="text-align:center;">'+
    '<div class="result-emoji">'+emoji+'</div>'+
    '<div class="result-title">'+lrState.correct+' / '+total+' 正解</div>'+
    '<div class="result-sub">'+p.title+'</div>'+
    scriptHTML+
    '<div class="lr-text-card" style="text-align:left;">'+
      '<div class="lr-title">📖 全文日本語訳</div>'+
      (lrState.showJp?'<div style="line-height:1.9;font-size:.9rem;">'+p.jp+'</div>':'<button class="jp-toggle-btn" onclick="toggleLRJp()">日本語訳を見る</button>')+
    '</div>'+
    '<div class="action-btns">'+
      '<button class="restart-btn" onclick="startPassage('+p.id+')">もう一度 🔄</button>'+
      '<button class="retry-btn" style="border-color:var(--accent);color:var(--accent);" onclick="lrState.screen=\'list\';render();">他の長文を選ぶ</button>'+
    '</div>'+
  '</div>';
}

function renderRead(){
  if(rState.screen==='start')renderReadStart();
  else if(rState.mode==='dictation'){
    if(rState.screen==='quiz')renderDictQuiz();
    else renderDictResult();
  }
  else if(rState.screen==='quiz')renderReadQuiz();
  else renderReadResult();
}

function renderReadStart(){
  var cats=rState.level==='hs'?['all'].concat(HS_GRAMMARS):['all'].concat(READ_PATTERNS);
  var cbHTML=catSelectHTML(cats,rState.cat,'setReadCat',false);
  var modeRow='<div class="vocab-mode-row">'+
    '<button class="vocab-mode-btn'+(rState.mode!=='dictation'?' active':'')+'" onclick="setReadMode(\'shadow\')">🗣️ 音読・シャドーイング</button>'+
    '<button class="vocab-mode-btn'+(rState.mode==='dictation'?' active':'')+'" onclick="setReadMode(\'dictation\')">✍️ ディクテーション</button>'+
  '</div>';
  var levelHTML='<div class="vocab-mode-row">'+
    '<button class="vocab-mode-btn'+(rState.level==='basic'?' active':'')+'" onclick="setReadLevel(\'basic\')">📘 中学（基本5文型）</button>'+
    '<button class="vocab-mode-btn'+(rState.level==='hs'?' active':'')+'" onclick="setReadLevel(\'hs\')">📗 高校入門（複文）</button>'+
  '</div>';
  var isDict=rState.mode==='dictation';
  var titleText=isDict?'✍️ ディクテーション':'🗣️ 文型タグ音読';
  var subText=isDict?'音声を聞いて、聞き取った単語をワードバンクからタップして空欄を埋めよう。入力は不要、全部タップだけでOK！':'動詞を見つけてタップ→S・O・Cが浮き上がる→声に出して読もう。採点もテストもなし、気楽にどうぞ。';
  var btnText=isDict?'ディクテーション開始 →':'音読スタート →';
  app.innerHTML='<div class="start-wrap">'+
    '<div class="start-title">'+titleText+'</div>'+
    '<div class="start-sub">'+subText+'</div>'+
    modeRow+levelHTML+cbHTML+
    '<button class="start-btn" onclick="startReadSession(rState.cat)">'+btnText+'</button>'+
  '</div>';
}

function renderReadQuiz(){
  var item=rState.queue[rState.idx];
  if(!item){rState.screen='start';renderReadStart();return;}
  var total=rState.queue.length;
  var pBar=Math.round((rState.idx/total)*100);
  var progressHTML='<div class="abort-row"><button class="abort-btn" onclick="abortReadSession()">✕ 中断する</button></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'+
      '<div style="flex:1;height:5px;background:var(--surface);border-radius:3px;overflow:hidden;">'+
        '<div style="height:100%;width:'+pBar+'%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;"></div>'+
      '</div>'+
      '<div style="font-size:.78rem;color:var(--muted);white-space:nowrap;">'+(rState.idx+1)+'/'+total+'</div>'+
    '</div>';

  var body;
  if(!rState.revealed){
    var words=item.chunks.map(function(c){return c.t;}).join(' ').split(' ');
    var wHTML=words.map(function(w,i){
      return '<span class="read-word" onclick="tapReadWord('+i+')">'+w+'</span>';
    }).join('');
    var promptTxt=rState.level==='hs'?
      '💭 文の中に動詞が複数あるかも。<b>メインの動詞</b>(節の中のものじゃなく)を見つけてタップ！':
      '💭 これ何文型かな？少し考えてみて。決まったら<b>動詞</b>をタップ！';
    body='<div class="read-prompt">'+promptTxt+'</div>'+
      '<div class="vquiz-card">'+
        '<button class="speak-btn" onclick="speakCurrentRead()">🔊 音声で聞く</button>'+
        '<div class="read-sentence" id="readSentence">'+wHTML+'</div>'+
      '</div>';
  } else {
    var chunkHTML=item.chunks.map(function(c){
      return '<span class="read-chunk role-'+c.r+'"><span class="read-chunk-label">'+c.r+'</span><span class="read-chunk-text">'+c.t+'</span>'+(c.note?'<span class="read-chunk-note">'+c.note+'</span>':'')+'</span>';
    }).join('');
    var badgeTxt=rState.level==='hs'?(item.grammar+'（'+GRAMMAR_JP[item.grammar]+'）'):(item.pattern+'（'+PATTERN_JP[item.pattern]+'）');
    body='<div class="read-pattern-badge">'+badgeTxt+'</div>'+
      '<div class="vquiz-card">'+
        '<button class="speak-btn" onclick="speakCurrentRead()">🔊 音声で聞く</button>'+
        '<div class="read-sentence">'+chunkHTML+'</div>'+
        (rState.showJp?'<div class="read-jp">'+item.jp+'</div>':'')+
      '</div>'+
      (rState.showJp?'':'<button class="jp-toggle-btn" onclick="toggleReadJp()">日本語訳を見る</button>')+
      '<div class="action-row" style="margin-top:14px;"><button class="next-btn" onclick="nextReadItem()">🔊 音読した → 次へ</button></div>';
  }
  app.innerHTML=progressHTML+body;
}

function tapReadWord(i){
  var item=rState.queue[rState.idx];
  if(rState.revealed)return;
  var words=item.chunks.map(function(c){return c.t;}).join(' ').split(' ');
  var w=words[i].replace(/[.,]/g,'').toLowerCase();
  var vChunk=item.chunks.filter(function(c){return c.r==='V';})[0];
  if(!vChunk){ rState.revealed=true; render(); return; }
  var vWords=vChunk.t.toLowerCase().replace(/[.,]/g,'').split(' ');
  if(vWords.indexOf(w)>=0){
    rState.revealed=true;render();
  } else {
    rState.missThis++;
    var el=document.querySelectorAll('#readSentence .read-word')[i];
    if(el){el.classList.add('miss');setTimeout(function(){el.classList.remove('miss');},300);}
  }
}
function toggleReadJp(){rState.showJp=true;render();}

function nextReadItem(){
  try{window.speechSynthesis.cancel();}catch(e){}
  var item=rState.queue[rState.idx];
  if(rState.level==='hs'){
    var g=item.grammar;
    var gs=rState.hsStats[g]||{seen:0,miss:0};
    gs.seen++;
    if(rState.missThis>0)gs.miss++;
    rState.hsStats[g]=gs;
    saveHsStats(rState.hsStats);
  } else {
    var p=item.pattern;
    var ps=rState.patternStats[p]||{seen:0,miss:0};
    ps.seen++;
    if(rState.missThis>0)ps.miss++;
    rState.patternStats[p]=ps;
    savePatternStats(rState.patternStats);
  }

  if(rState.idx>=rState.queue.length-1){rState.screen='result';}
  else{rState.idx++;rState.revealed=false;rState.missThis=0;rState.showJp=false;}
  recordDailyActivity();
  render();
}

function renderReadResult(){
  var labels=rState.level==='hs'?HS_GRAMMARS:READ_PATTERNS;
  var jpMap=rState.level==='hs'?GRAMMAR_JP:PATTERN_JP;
  var statSrc=rState.level==='hs'?rState.hsStats:rState.patternStats;
  var weak=labels.filter(function(p){
    var s=statSrc[p];
    return s&&s.seen>=3&&(s.miss/s.seen)>=0.4;
  });
  var weakHTML=weak.length>0?
    '<div class="word-box"><div class="word-label">⚠️ 苦手かもしれない文型・構文</div><div class="word-list">'+
      weak.map(function(p){return '<span class="word-chip"><b>'+p+'</b>（'+jpMap[p]+'）</span>';}).join('')+
    '</div></div>'
    : '<div style="color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:14px;">今のところ苦手な文型・構文はなし👍</div>';
  app.innerHTML='<div class="result-wrap" style="text-align:center;">'+
    '<div class="result-emoji">🎉</div>'+
    '<div class="result-title">お疲れさま！</div>'+
    '<div class="result-sub">'+rState.queue.length+'文、音読完了</div>'+
    weakHTML+
    '<div class="action-btns">'+
      '<button class="restart-btn" onclick="startReadSession(rState.cat)">もう一度</button>'+
      '<button class="retry-btn" style="border-color:var(--accent);color:var(--accent);" onclick="rState.screen=\'start\';render();">パターンを変える</button>'+
    '</div>'+
  '</div>';
}

window.setCategory=setCategory;window.setMode=setMode;window.changeCat=changeCat;
window.setLevelFilter=setLevelFilter;window.startRandomAll=startRandomAll;window.startRetryDirect=startRetryDirect;
window.startCategoryQuiz=startCategoryQuiz;window.toggleStartExpand=toggleStartExpand;
window.answerChoice=answerChoice;window.answerInput=answerInput;window.nextQuestion=nextQuestion;
window.finishQuiz=finishQuiz;window.startQuiz=startQuiz;window.restartQuiz=restartQuiz;
window.retryMistakes=retryMistakes;window.switchTab=switchTab;window.goHome=goHome;
window.setVocabCat=setVocabCat;window.setVocabMode=setVocabMode;
window.answerVQuiz=answerVQuiz;window.nextVQuiz=nextVQuiz;window.restartVQuiz=restartVQuiz;
window.resetStats=resetStats;
window.setReadCat=setReadCat;window.startReadSession=startReadSession;window.tapReadWord=tapReadWord;
window.toggleReadJp=toggleReadJp;window.nextReadItem=nextReadItem;window.setReadLevel=setReadLevel;
window.speakCurrentRead=speakCurrentRead;
window.setLRLevel=setLRLevel;window.startPassage=startPassage;window.answerLR=answerLR;
window.nextLRQuestion=nextLRQuestion;window.finishLR=finishLR;window.toggleLRJp=toggleLRJp;
window.setLRMode=setLRMode;window.toggleLRScript=toggleLRScript;
window.setReadMode=setReadMode;window.tapBankTile=tapBankTile;window.tapFilledSlot=tapFilledSlot;
window.checkDictAnswer=checkDictAnswer;window.nextDictItem=nextDictItem;window.playDictAudio=playDictAudio;
window.abortDrillQuiz=abortDrillQuiz;window.abortVQuiz=abortVQuiz;
window.abortReadSession=abortReadSession;window.abortLRPassage=abortLRPassage;
render();
</script>
</body>
</html>
